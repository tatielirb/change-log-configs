name: Create release changelog

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-changelog:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Generate changelog
        run: node generate-changelog.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Get default branch name
        id: get_branch
        run: |
          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d':' -f2 | tr -d ' ')
          echo "branch=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout default branch
        run: git checkout ${{ steps.get_branch.outputs.branch }}

      - name: Commit changelog file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update changelog [skip ci]" || echo "No changes to commit"
          git push origin ${{ steps.get_branch.outputs.branch }}

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitPrereleaseDuringUpdate: true
          bodyFile: CHANGELOG.md
          token: ${{ secrets.GH_PAT }}
