name: Create release changelog

on:
  push:
    tags:
      - 'v*'

jobs:
  release-changelog:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false  

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Generate changelog
        run: node generate-changelog.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Checkout default branch
        run: git checkout ${{ github.event.repository.default_branch }}

      - name: Commit changelog file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update changelog [skip ci]" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }} HEAD:${{ github.event.repository.default_branch }}

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitPrereleaseDuringUpdate: true
          bodyFile: CHANGELOG.md
          token: ${{ secrets.GH_PAT }}